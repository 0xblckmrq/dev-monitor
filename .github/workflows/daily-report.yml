name: Daily Dev Report

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      MATRIX_TOKEN: ${{ secrets.MATRIX_TOKEN }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch data and build report
        run: python3 scripts/build_report.py

      - name: Save report to repo
        run: |
          mkdir -p reports
          cp /tmp/daily-report.txt reports/daily-report.txt
          git config user.name "dev-monitor"
          git config user.email "dev-monitor@users.noreply.github.com"
          git add reports/daily-report.txt
          git diff --cached --quiet || git commit -m "report: $(date -u +%Y-%m-%d)"
          git pull --rebase && git push

      - name: Post to Matrix
        run: python3 scripts/post_matrix.py
        continue-on-error: true
